<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <!-- Lens ring gradient -->
    <linearGradient id="ring" x1="40" y1="40" x2="170" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Lens glass gradient -->
    <radialGradient id="glass" cx="95" cy="95" r="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.02"/>
    </radialGradient>
    <!-- Bolt gradient -->
    <linearGradient id="bolt" x1="85" y1="55" x2="115" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Handle gradient -->
    <linearGradient id="handle" x1="165" y1="165" x2="225" y2="225" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Outer glow for bolt -->
    <filter id="boltGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Subtle grid pattern for texture -->
  <g opacity="0.04">
    <line x1="64" y1="0" x2="64" y2="256" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="128" y1="0" x2="128" y2="256" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="192" y1="0" x2="192" y2="256" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="64" x2="256" y2="64" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="128" x2="256" y2="128" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="0" y1="192" x2="256" y2="192" stroke="#a78bfa" stroke-width="0.5"/>
  </g>

  <!-- Lens handle (behind the circle) -->
  <line x1="162" y1="162" x2="218" y2="218" stroke="url(#handle)" stroke-width="22" stroke-linecap="round"/>
  <!-- Handle highlight -->
  <line x1="164" y1="160" x2="216" y2="212" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

  <!-- Outer ring glow -->
  <circle cx="100" cy="100" r="68" stroke="#7c3aed" stroke-width="3" fill="none" opacity="0.3" filter="url(#glow)"/>

  <!-- Lens ring -->
  <circle cx="100" cy="100" r="65" stroke="url(#ring)" stroke-width="10" fill="none"/>
  <!-- Inner ring highlight -->
  <circle cx="100" cy="100" r="60" stroke="#c4b5fd" stroke-width="1.5" fill="none" opacity="0.25"/>

  <!-- Lens glass fill -->
  <circle cx="100" cy="100" r="55" fill="url(#glass)"/>

  <!-- Glass reflection arc -->
  <path d="M60 72 A50 50 0 0 1 130 62" stroke="#e9d5ff" stroke-width="2.5" fill="none" opacity="0.2" stroke-linecap="round"/>

  <!-- Lightning bolt -->
  <g filter="url(#boltGlow)">
    <path d="M112 58L82 106h24L96 148l38-54h-26l12-36z" fill="url(#bolt)"/>
  </g>
  <!-- Bolt highlight -->
  <path d="M110 62L84 104h20L96 138l30-42h-22l10-34z" fill="#fef3c7" opacity="0.3"/>

  <!-- Small sparkle dots -->
  <circle cx="58" cy="68" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="140" cy="135" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="48" cy="120" r="1.5" fill="#c4b5fd" opacity="0.4"/>
</svg>
